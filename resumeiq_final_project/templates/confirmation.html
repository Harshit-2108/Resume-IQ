<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Submission Received | Resume IQ</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #dfe9f3, #ffffff);
      overflow: hidden;
    }

    .message-box {
      background-color: #ffffff;
      padding: 50px 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      text-align: center;
      max-width: 600px;
      animation: fadeIn 1s ease-out;
    }

    .message-box h1 {
      color: #2c3e50;
      font-size: 2.8em;
      margin-bottom: 20px;
      animation: slideDown 0.8s ease-out;
    }

    .message-box p {
      font-size: 1.2em;
      color: #555;
      line-height: 1.6;
      animation: fadeIn 1.5s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .thankyou-icon {
      font-size: 60px;
      color: #27ae60;
      margin-bottom: 20px;
      animation: pop 0.6s ease;
    }

    @keyframes pop {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .back-button {
      display: inline-block;
      margin-top: 30px;
      padding: 12px 25px;
      background-color: #3498db;
      color: white;
      border: none;
      border-radius: 8px;
      text-decoration: none;
      font-size: 1em;
      transition: background-color 0.3s ease;
    }

    .back-button:hover {
      background-color: #2980b9;
    }
  </style>
</head>
<body>
  <div class="message-box">
    <div class="thankyou-icon">✅</div>
    <h1>Thank You!</h1>
    <p>Your details have been successfully received by us.</p>
    <p>We’ll let you know whenever there’s any update.</p>
    <a href="resume.html" class="back-button">Go to Home</a>
  </div>
</body>
</html>
